name: Deploy Generate Function

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'generate/**'
      - '.github/workflows/deploy-generate.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./generate/ ./cmd/generate-server/

      - name: Test
        run: go test -race ./generate/

      - name: Vet functions
        run: go vet ./functions/packages/generate/svg/

      - name: Test functions
        run: go test -race ./functions/packages/generate/svg/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install serverless support
        run: doctl serverless install

      - name: Connect to serverless namespace
        run: doctl serverless connect

      - name: Prepare function source
        env:
          STYLEMD_API_KEY: ${{ secrets.STYLEMD_API_KEY }}
        run: |
          cd functions/packages/generate/svg
          cp -r ../../../../generate ./generate
          cd generate && go mod init github.com/readmedotmd/style.md/generate && go mod edit -go=1.24 && cd ..
          go mod init exec
          go mod edit -go=1.24
          go mod edit -replace github.com/readmedotmd/style.md/generate=./generate
          GOFLAGS=-mod=mod go mod tidy
          cd ../../../..
          if [ -n "$STYLEMD_API_KEY" ]; then
            printf 'packages:\n  - name: generate\n    functions:\n      - name: svg\n        runtime: go:1.24\n        web: true\n        parameters:\n          STYLEMD_API_KEY: "%s"\n        limits:\n          timeout: 5000\n          memory: 256\n' "$STYLEMD_API_KEY" > functions/project.yml
          fi

      - name: Deploy function
        run: doctl serverless deploy functions
