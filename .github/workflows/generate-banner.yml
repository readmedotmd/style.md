name: Generate Banner

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/banner.svg'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate banner
        run: |
          curl -sf "${{ secrets.STYLEMD_GENERATE_URL }}?api_key=${{ secrets.STYLEMD_API_KEY }}&name=${{ github.event.repository.name }}&tagline=$(echo '${{ github.event.repository.description }}' | jq -sRr @uri)&version=${{ steps.version.outputs.version }}" > .github/banner.svg

      - name: Commit banner
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/banner.svg
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Update banner [skip ci]'
            git push
          fi
