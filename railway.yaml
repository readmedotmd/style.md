services:
  asset-generator:
    builder: DOCKERFILE
    dockerfilePath: Dockerfile
    healthcheckPath: /health
    healthcheckTimeout: 5
    restartPolicyType: ON_FAILURE
    restartPolicyMaxRetries: 3
    generateDomain: true
    variables:
      PORT: 8080
      TRUST_PROXY: "true"
      RATE_LIMIT: 30
